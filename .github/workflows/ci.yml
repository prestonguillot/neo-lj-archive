name: CI

# Build and run the test suite on every push and PR to main, and on demand.
# Branch protection requires this check to pass before a PR can merge.
#
# CI never touches LiveJournal. It's someone else's server, it bans clients, and
# a suite that depends on a 2010-era API being up fails for reasons unrelated to
# our code. Fetcher tests replay recorded fixtures (DESIGN.md §10).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual trigger via the Actions UI

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # 22.13 is the floor (node:sqlite unflagged from there). 24 is what
        # Electron 43 bundles — the M5 target. node:sqlite is still a release
        # candidate, so this matrix is what catches API drift between the
        # version we develop on and the one the app will eventually ship
        # (DESIGN.md §15).
        node: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      # The build's tsconfig only covers src/ and excludes *.test.ts, and vitest
      # transpiles without typechecking. Without this step nothing looks at the
      # tests at all.
      - name: Type-check tests
        run: npm run type-check:tests

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm run test:run

  e2e:
    name: E2E (the site in a real browser)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # The archive's promise is "open index.html, offline, forever" (DESIGN.md
    # §13), and a browser is the only oracle for it. The unit suite proves the
    # HTML says the right things; it cannot prove Chromium renders them, that a
    # relative stylesheet resolves from file://, or that an image decodes.
    #
    # One Node version, not the matrix: the site is static HTML, so what Chromium
    # renders doesn't vary by the Node that emitted it, and a browser download per
    # matrix leg buys nothing. The matrix job above is what covers Node drift.
    #
    # It builds a synthetic archive — never the author's journal, which is private
    # and not in source control.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Keyed on the resolved Playwright version: a browser build is pinned to
          # it, so a stale cache after an upgrade is a confusing failure.
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # The cached path restores the browser but not the OS libs it links against.
      - name: Install browser system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
