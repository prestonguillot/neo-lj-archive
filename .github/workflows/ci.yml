name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 is the floor (node:sqlite unflagged since 22.13). 24 is what
        # Electron 43 bundles — the M5 target. node:sqlite is still a release
        # candidate, so this matrix is what catches API drift between the
        # version we develop on and the one the app will ship. DESIGN.md §15.
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      # CI never touches LiveJournal. It's someone else's server, it bans
      # clients, and a suite that depends on a 2010-era API being up fails for
      # reasons unrelated to our code. DESIGN.md §10.
