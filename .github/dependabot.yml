version: 2

# Two ecosystems to scan: the npm dependencies in package.json and the GitHub
# Actions pinned in .github/workflows/*.yml. Dependabot PRs are NOT auto-labeled
# release:* - a dependency bump doesn't automatically warrant cutting a release;
# add a release label manually before merging if you want one to ship.
#
# Worth watching here specifically: node:sqlite is a release candidate, so its
# API can shift under us. That won't arrive as a Dependabot PR - it arrives as a
# Node version bump. The CI matrix (22 and 24) is what catches it. See
# DESIGN.md §15.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies

    # TypeScript majors are blocked on the linter, not on us. typescript-eslint
    # 8.64.0 (latest stable; everything past it is 8.64.1-alpha.*) still declares
    # peer typescript ">=4.8.4 <6.1.0", so TS 7 cannot resolve and `npm ci` fails
    # before any of our code compiles. Without this rule Dependabot re-proposes a
    # PR that cannot go green, every month, and a permanently-red PR trains you to
    # ignore red.
    #
    # REMOVE THIS once typescript-eslint ships a TS 7 peer range. Minor and patch
    # TS updates still flow normally.
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
